# =====================================================
# CommandDelay - Configuración principal
# =====================================================
# Plugin para ejecutar acciones programadas en horarios fijos.
# Pensado para eventos automáticos como bosses de MythicMobs.
#
# Formatos de hora aceptados: "18:30", "8:00", "8:00 AM", "06:30 PM", "18:30 PM".
# Los comandos se ejecutan desde consola. Puedes escribirlos con o sin "/".
#
# Formatos de texto soportados en anuncios:
# - Legacy: &a, &c, &l
# - Hex: &#FFAA00, <#FFAA00>, #FFAA00
# - Tags simples: <red>, <green>, <bold>, <reset>
# - Gradientes: <gradient:#FF0000:#FFFF00>Texto</gradient>
# - PlaceholderAPI en anuncios y comandos, si el plugin está instalado.

settings:
  # Zona horaria usada para calcular los horarios.
  # timezone: "America/Argentina/Buenos_Aires"
  timezone: "America/Lima"

  # Cada cuántos segundos el plugin revisa si hay horarios pendientes.
  # Recomendado: 10 a 30 segundos.
  check-interval-seconds: 20

  # Si está en true, se elimina automáticamente el primer "/" de cada comando.
  remove-leading-slash: true

  # Si está en true, los colores dentro de comandos serán convertidos a colores de Minecraft.
  translate-command-colors: true

  # Activa el puente MiniMessage/legacy inspirado en tu sistema de SpookyMenus.
  use-minimessage: true

  # Soporte opcional para PlaceholderAPI en anuncios y comandos.
  placeholderapi:
    enabled: true

  # Cantidad de días que se conservarán en el historial interno de ejecuciones.
  # Este historial evita que un mismo horario se ejecute dos veces dentro del mismo minuto.
  history-retention-days: 30

  # Muestra más información técnica en consola.
  debug: false

# =====================================================
# Horarios disponibles
# =====================================================
# days acepta:
# - "TODOS" o "ALL"
# - LUNES, MARTES, MIERCOLES, JUEVES, VIERNES, SABADO, DOMINGO
# - MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY
#
# requirements es opcional:
# - min-players-online: mínimo de jugadores que deben recibir/activar el evento.
# - worlds: limita jugadores objetivo por mundo.
# - permission: limita jugadores objetivo por permiso.
#
# action-delay-mode controla cómo se interpretan los delay-seconds:
# - ABSOLUTE: modo clásico. Cada delay se cuenta desde el inicio del horario.
# - SEQUENTIAL: ejecuta acciones una por una. Cada delay se cuenta desde la acción anterior.
#
# actions soporta:
# - COMMAND
# - CHAT / BROADCAST
# - TITLE
# - ACTIONBAR
# - SOUND
# - BOSSBAR
#
# BOSSBAR soporta:
# - color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
# - overlay/style: PROGRESS/SOLID, NOTCHED_6/SEGMENTED_6, NOTCHED_10/SEGMENTED_10,
#                  NOTCHED_12/SEGMENTED_12, NOTCHED_20/SEGMENTED_20
# - progress: 0.0 a 1.0, o 0 a 100
# - duration-seconds o duration-ticks
# - decrease-progress: true/false. Si está en true, la barra baja hasta 0 durante su duración.
# - flags: DARKEN_SCREEN, PLAY_BOSS_MUSIC, CREATE_WORLD_FOG
#   También puedes usar darken-screen, play-boss-music y create-world-fog como booleanos.
#
# Placeholders internos disponibles en acciones:
# %schedule%, %event_id%, %schedule_display_name%, %schedule_name%, %event_name%,
# %schedule_plain_name%, %schedule_raw_name%,
# %schedule_time_24%, %schedule_time_24_ampm%, %schedule_time_12%,
# %schedule_times_24%, %schedule_times_24_ampm%, %schedule_times_12%,
# %online%, %targets%, %min_players%,
# %player%, %world%, %x%, %y%, %z%
#
# Placeholders externos para PlaceholderAPI:
# Globales:
# %commanddelay_next_schedule%
# %commanddelay_next_schedule_display%
# %commanddelay_next_schedule_name%
# %commanddelay_next_schedule_plain_name%
# %commanddelay_next_action%
# %commanddelay_next_status%
# %commanddelay_next_remaining%
# %commanddelay_next_remaining_long%
# %commanddelay_next_remaining_compact%
# %commanddelay_next_remaining_clock%
# %commanddelay_next_remaining_clock_full%
# %commanddelay_next_remaining_seconds%
# %commanddelay_next_time%
# %commanddelay_next_datetime%
# %commanddelay_next_schedule_time_24%
# %commanddelay_next_schedule_time_24_ampm%
# %commanddelay_next_schedule_time_12%
# %commanddelay_next_schedule_times_24%
# %commanddelay_next_schedule_times_24_ampm%
# %commanddelay_next_schedule_times_12%
#
# Notas importantes para PlaceholderAPI:
# - Si un placeholder devuelve N/A, revisa primero /commanddelay list para confirmar
#   que el horario fue cargado. Un horario con horas inválidas o sin acciones válidas
#   no se registra en memoria.
# - Los IDs son tolerantes: Boss_Dragon, boss-dragon, boss_dragon y Dragon pueden
#   resolver el mismo horario cuando el ID o display-name coinciden.
#
# Por horario:
# %commanddelay_remaining_<id>%
# %commanddelay_remaining_long_<id>%
# %commanddelay_remaining_clock_<id>%
# %commanddelay_remaining_seconds_<id>%
# %commanddelay_next_action_<id>%
# %commanddelay_status_<id>%
# %commanddelay_time_24_<id>%
# %commanddelay_time_24_ampm_<id>%
# %commanddelay_time_12_<id>%
# %commanddelay_times_24_<id>%
# %commanddelay_times_24_ampm_<id>%
# %commanddelay_times_12_<id>%
# %commanddelay_name_<id>%
# %commanddelay_display_name_<id>%
# %commanddelay_plain_name_<id>%
#
# También soporta el estilo:
# %commanddelay_<id>_remaining%
# %commanddelay_<id>_remaining_clock%
# %commanddelay_<id>_next_action%
# %commanddelay_<id>_time_24%
# %commanddelay_<id>_time_24_ampm%
# %commanddelay_<id>_time_12%
# %commanddelay_<id>_times_24%
# %commanddelay_<id>_times_24_ampm%
# %commanddelay_<id>_times_12%
# %commanddelay_<id>_name%
#
# display-name/display_name permite mostrar nombres con formato en placeholders y mensajes.
# El ID del schedule debe mantenerse simple cuando sea posible.

schedules:
  boss_dragon_infernal:
    enabled: false
    display-name: "&#FF3300&lDragón Infernal"
    # ABSOLUTE mantiene el comportamiento antiguo.
    # SEQUENTIAL permite escribir delays relativos sin sumar manualmente.
    action-delay-mode: "SEQUENTIAL"
    days:
      - "TODOS"
    times:
      - "20:00"
    requirements:
      min-players-online: 1
      worlds: []
      permission: ""
    actions:
      - type: "CHAT"
        delay-seconds: 0
        messages:
          - ""
          - "<dark_gray>[<gradient:#FFAA00:#FF3300><bold>Boss</bold></gradient><dark_gray>] <yellow>El boss %schedule_display_name% <yellow>aparecerá en <white>5 minutos</white>."
          - "<gray>Jugadores conectados: <green>%online%</green>. Prepárate, <aqua>%player%</aqua>."
          - ""

      - type: "TITLE"
        delay-seconds: 240
        title: "<red><bold>¡Boss próximo!</bold>"
        subtitle: "<yellow>Dragón Infernal aparecerá en 1 minuto"
        fade-in-ticks: 10
        stay-ticks: 60
        fade-out-ticks: 20

      - type: "ACTIONBAR"
        delay-seconds: 30
        message: "<gold>El boss aparecerá en <red>30 segundos</red>..."

      - type: "BOSSBAR"
        delay-seconds: 0
        message: "<gradient:#FFAA00:#FF3300><bold>%schedule_plain_name%</bold></gradient> <yellow>aparece a las <white>%schedule_time_12%</white>"
        color: "PURPLE"
        overlay: "NOTCHED_10"
        progress: 1.0
        duration-seconds: 25
        decrease-progress: true
        flags: []

      - type: "SOUND"
        delay-seconds: 25
        sound: "entity.ender_dragon.growl"
        volume: 1.0
        pitch: 1.0

      - type: "COMMAND"
        delay-seconds: 5
        command: "mm mobs spawn DragonInfernal 1 world,100,70,100"

      - type: "CHAT"
        delay-seconds: 0
        messages:
          - ""
          - "<dark_gray>[<red><bold>Boss</bold></red><dark_gray>] <red>¡El Dragón Infernal ha aparecido!"
          - "<gray>Ve a la zona del evento para enfrentarlo."
          - ""

  # Formato simple
  mantenimiento_nocturno:
    enabled: false
    days:
      - "TODOS"
    times:
      - "23:55"
    commands:
      - command: "say &eEl servidor guardará el mundo en 5 segundos."
        delay-seconds: 0
      - command: "save-all"
        delay-seconds: 5
